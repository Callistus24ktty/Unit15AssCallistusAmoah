<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Booking Confirmed — Pulse VR</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="js/accessibility-settings.js"></script>

<style>

/* ============================================================
   CSS VARIABLES — design tokens
   ============================================================ */
:root{
  --neon-purple:#b026e0;
  --neon-bright:#e020e0;
  --neon-gold:#c4a020;
  --bg:#000000;
  --bg2:rgba(28,10,38,.75);
  --bg3:rgba(37,20,58,.80);
  --text:#f0e8f8;
  --text-dim:#9a80aa;
  --border:rgba(176,38,224,.28);
  --glow-purple:0 0 18px rgba(176,38,224,.55);
  --glow-bright:0 0 18px rgba(224,32,224,.55);
  --glow-gold:0 0 18px rgba(196,160,32,.5);
  --font-display:'Orbitron',monospace;
  --font-body:'Rajdhani',sans-serif;
  --radius:8px;
  --radius-lg:16px;
  --transition:.25s ease;
}

/* ============================================================
   RESET & BASE
   ============================================================ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:var(--font-body);
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:3rem 1.5rem;
  text-align:center;
}

/* ============================================================
   ANIMATED SUCCESS CHECKMARK CIRCLE
   Pops in with a spring animation on page load
   ============================================================ */
.check-circle{
  width:110px;height:110px;border-radius:50%;
  background:linear-gradient(135deg,var(--neon-purple),var(--neon-bright));
  display:flex;align-items:center;justify-content:center;
  font-size:3rem;margin-bottom:2rem;
  box-shadow:0 0 40px rgba(176,38,224,.7),0 0 80px rgba(224,32,224,.4);
  animation:popIn .6s cubic-bezier(.175,.885,.32,1.275) both;
}
@keyframes popIn{
  from{transform:scale(0);opacity:0}
  to{transform:scale(1);opacity:1}
}

/* ============================================================
   HEADING & SUBTEXT
   ============================================================ */
h1{
  font-family:var(--font-display);
  font-size:clamp(1.6rem,4vw,2.8rem);
  letter-spacing:.08em;margin-bottom:.8rem;
}
.neon-text{
  color:var(--neon-bright);
  text-shadow:var(--glow-bright);
}
.confirm-sub{
  color:var(--text-dim);font-size:1rem;
  max-width:460px;line-height:1.7;margin-bottom:2rem;
}

/* ============================================================
   BOOKING REFERENCE BADGE
   Unique auto-generated reference number displayed prominently
   ============================================================ */
.ref-badge{
  background:linear-gradient(135deg,rgba(176,38,224,.2),rgba(224,32,224,.1));
  border:1px solid var(--neon-purple);
  border-radius:var(--radius);padding:.6rem 2rem;
  font-family:var(--font-display);font-size:1.1rem;
  letter-spacing:.2em;color:var(--neon-bright);
  text-shadow:var(--glow-bright);margin-bottom:2.5rem;
  display:inline-block;
  box-shadow:var(--glow-purple);
}

/* ============================================================
   BOOKING DETAILS SUMMARY CARD
   Shows date, time, players, categories, location and status
   ============================================================ */
.details-card{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  padding:2rem 2.5rem;
  max-width:500px;width:100%;
  margin-bottom:2.5rem;
  text-align:left;
}
.details-card h3{
  font-family:var(--font-display);font-size:.7rem;
  letter-spacing:.18em;color:var(--neon-gold);
  text-shadow:var(--glow-gold);
  margin-bottom:1.5rem;
}

/* Each row in the summary card */
.detail-row{
  display:flex;justify-content:space-between;
  align-items:center;padding:.75rem 0;
  border-bottom:1px solid rgba(255,255,255,.05);
  font-size:.92rem;
}
.detail-row:last-child{border-bottom:none}
.detail-row .label{color:var(--text-dim)}
.detail-row .value{
  color:var(--text);font-weight:600;
  font-family:var(--font-display);
  font-size:.7rem;letter-spacing:.06em;
}
/* Status badge styled differently */
.status-confirmed{color:var(--neon-gold);text-shadow:var(--glow-gold)}

/* ============================================================
   ACTION BUTTONS
   ============================================================ */
.btn{
  display:inline-block;padding:.75rem 2rem;
  border-radius:var(--radius);
  font-family:var(--font-display);
  font-size:.72rem;letter-spacing:.12em;font-weight:700;
  border:none;cursor:pointer;transition:var(--transition);
}
.btn-primary{
  background:linear-gradient(135deg,var(--neon-purple),var(--neon-bright));
  color:#fff;box-shadow:var(--glow-purple);
}
.btn-primary:hover{box-shadow:0 0 30px rgba(224,32,224,.8);transform:translateY(-2px)}
.btn-outline{
  background:transparent;
  border:1px solid var(--neon-bright);
  color:var(--neon-bright);
}
.btn-outline:hover{background:rgba(224,32,224,.1);box-shadow:var(--glow-bright)}

.confirm-actions{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center}

/* ============================================================
   SCROLLBAR
   ============================================================ */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--neon-purple);border-radius:3px}
</style>
</head>
<body>

  <!-- Animated success checkmark -->
  <div class="check-circle">✓</div>

  <!-- Confirmation heading -->
  <h1>BOOKING <span class="neon-text">CONFIRMED!</span></h1>
  <p class="confirm-sub">
    Your VR session has been successfully booked. A confirmation
    email has been sent to you. Get ready to enter the game!
  </p>

  <!-- Auto-generated booking reference number -->
  <div class="ref-badge" id="refNumber"></div>

  <!-- Booking summary card -->
  <div class="details-card">
    <h3>BOOKING SUMMARY</h3>
    <div class="detail-row">
      <span class="label">Date</span>
      <span class="value" id="conf-date">15 Jun 2026</span>
    </div>
    <div class="detail-row">
      <span class="label">Time</span>
      <span class="value">9:41 AM</span>
    </div>
    <div class="detail-row">
      <span class="label">Players</span>
      <span class="value">2 Players</span>
    </div>
    <div class="detail-row">
      <span class="label">Categories</span>
      <span class="value">Action, Sci-Fi, Adventure</span>
    </div>
    <div class="detail-row">
      <span class="label">Location</span>
      <span class="value">PULSE VR — MANCHESTER</span>
    </div>
    <div class="detail-row">
      <span class="label">Status</span>
      <span class="value status-confirmed">✦ CONFIRMED</span>
    </div>
  </div>

  <!-- Action buttons -->
  <div class="confirm-actions">
    <button class="btn btn-primary" onclick="window.location.href='index.html'">BACK TO HOME</button>
    <button class="btn btn-outline" onclick="window.print()">PRINT CONFIRMATION</button>
  </div>
<script>
  function formatDate(dateISO) {
    const date = new Date(dateISO);
    const options = { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' };
    return new Intl.DateTimeFormat('en-GB', options).format(date);
  }

  function formatTime(timeValue) {
    const [hours, minutes] = timeValue.split(':');
    const date = new Date();
    date.setHours(Number(hours), Number(minutes));
    return date.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
  }

  function populateConfirmation() {
    const urlParams = new URLSearchParams(window.location.search);
    const booking = urlParams.has('date') && urlParams.has('time')
      ? {
          date: urlParams.get('date'),
          time: urlParams.get('time'),
          players: Number(urlParams.get('players') || '1'),
          categories: urlParams.get('categories') ? urlParams.get('categories').split(',') : [],
          location: urlParams.get('location') || 'PULSE VR — MANCHESTER',
        }
      : null;

    const now = new Date();
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

    document.getElementById('refNumber').textContent =
      'PVR-' + Math.random().toString(16).slice(2,8).toUpperCase();

    if (!booking) {
      document.getElementById('conf-date').textContent =
        `${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
      return;
    }

    const confDate = document.getElementById('conf-date');
    if (confDate) {
      confDate.textContent = formatDate(booking.date);
    }

    const timeValue = document.querySelector('.details-card .detail-row:nth-child(2) .value');
    if (timeValue) {
      timeValue.textContent = formatTime(booking.time);
    }

    const playersValue = document.querySelector('.details-card .detail-row:nth-child(3) .value');
    if (playersValue) {
      playersValue.textContent = `${booking.players} Player${booking.players === 1 ? '' : 's'}`;
    }

    const categoryValue = document.querySelector('.details-card .detail-row:nth-child(4) .value');
    if (categoryValue) {
      categoryValue.textContent = booking.categories.length ? booking.categories.join(', ') : 'Action';
    }

    const locationValue = document.querySelector('.details-card .detail-row:nth-child(5) .value');
    if (locationValue) {
      locationValue.textContent = booking.location;
    }
  }

  populateConfirmation();
</script>
<script src="javascript/javascript.js"></script>
</body>
</html>
